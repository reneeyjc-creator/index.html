<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUNHO CALENDAR</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+TC:wght@300;400;500;600&family=Noto+Serif+TC:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#2A2826;--c-surface:#1A1814;--c-border:#3A3634;--c-border2:#4A4644;
  --c-page:#F2F0ED;--c-card:#FFFFFF;--c-text-on-dark:#E8E4E0;
  --c-text:#1A1714;--c-muted:#6B6460;--c-hint:#A09A95;
  --c-sched-bg:#F0EEFF;--c-sched-fg:#4A3FA8;
  --c-sns-bg:#E3F5EE;--c-sns-fg:#0B6B50;
  --c-photo-bg:#FCEAF2;--c-photo-fg:#8C2A55;
  --c-accent:#1A1714;--radius:6px;--radius-lg:12px;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#201F1F;color:#E8E4E0;min-height:100vh;line-height:1.5}

/* ── Site header ── */
.site-header{background:#201F1F;padding:18px 32px 0;border-bottom:none;position:sticky;top:0;z-index:100}
.header-row1{display:flex;align-items:center;justify-content:center;gap:20px;padding-bottom:10px;position:relative}
.header-row2{display:flex;align-items:center;justify-content:space-between;padding:8px 0 14px}
.site-footer{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px 16px 90px;border-top:1px solid var(--c-border)}
.site-title-en{font-family:'Black Han Sans',system-ui,sans-serif;font-size:44px;font-weight:400;letter-spacing:.01em;line-height:1;color:#FFD940;text-transform:uppercase;white-space:nowrap}
.site-title-cal{font-family:'Black Han Sans',system-ui,sans-serif;font-size:20px;font-weight:400;letter-spacing:.12em;color:rgba(255,217,64,.5);text-transform:uppercase}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-hdr{padding:6px 14px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:all .15s}
.btn-hdr:hover{background:rgba(255,255,255,.08);color:#fff}
.cal-filter-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.cal-legend{display:flex;gap:16px;margin-top:12px;justify-content:center}
.cal-filter-btn{padding:4px 12px;border-radius:50px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.cal-filter-btn.active{background:#FFD940;color:#201F1F;border-color:#FFD940;font-weight:600}
.cfb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.page-tabs{display:flex;gap:6px}
.page-tab{padding:6px 16px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.04em;border-radius:50px}
.page-tab.active{background:#FFD940;color:#201F1F;border-color:#FFD940;font-weight:600}

/* ── Pages ── */
.page{display:none;padding:28px 32px;background:#201F1F;min-height:calc(100vh - 120px)}
.page.active{display:block}

/* ── Calendar page ── */
.cal-header{display:flex;align-items:baseline;gap:20px;margin-bottom:24px}
.cal-month-title{font-family:'Noto Serif TC',serif;font-size:36px;font-weight:300;letter-spacing:.04em;color:#E8E4E0}
.cal-nav-btns{display:flex;gap:6px}
.nav-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:15px;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.1)}

/* DOW row */
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dow{font-size:10px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;padding:0 0 4px 2px}

/* Main grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:220px;gap:2px}

/* Cell */
.cal-cell{background:#2A2826;display:flex;flex-direction:column;overflow:hidden;cursor:default;border:1px solid #3A3634;transition:border-color .15s;height:220px;border-radius:4px}
.cal-cell.has-records{cursor:pointer}
.cal-cell.has-records:hover{border-color:#7F77DD;box-shadow:0 2px 8px rgba(127,119,221,.15)}
.cal-cell.today .cell-date-row .cell-date{background:#FFD940;color:#201F1F;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.other-month{opacity:.38}

/* Date row (top of cell) */
.cell-date-row{display:flex;align-items:center;gap:5px;padding:8px 8px 6px;flex-shrink:0}
.cell-date{font-size:13px;font-weight:700;font-family:'Trebuchet MS','Impact',system-ui,sans-serif;color:#C8C4BE;min-width:22px;line-height:22px;text-align:center;font-style:italic;letter-spacing:.02em}
.cell-dots{display:flex;gap:3px;align-items:center}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cdot-schedule{background:#7F77DD}
.cdot-sns{background:#1D9E75}
.cdot-bubble{background:#E65100}
.cdot-media{background:#B44FE8}
.cdot-message{background:#1B5E20}

/* Photo area (middle) */
.cell-photo{flex:1;min-height:0;overflow:hidden;background:transparent}
.cell-photo img{width:100%;height:100%;object-fit:cover;display:block}
.cell-photo-empty{width:100%;height:100%;background:transparent}

/* Text area (bottom) */
.cell-text{flex-shrink:0;padding:6px 8px 8px;min-height:44px;overflow-y:auto}
.cell-text-mobile{display:none}
.cell-text-desktop{display:block}
.cell-title{font-size:11px;font-weight:500;color:#E0DDD8;line-height:1.35;margin-bottom:1px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.cell-sub{font-size:10px;color:#7A7672;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.cell-time{font-size:10px;color:#7A7672;margin-top:1px}

/* Legend */
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--c-muted)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Feed / Photo wall page ── */
.feed-controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn.active{background:#FFD940;color:#201F1F;border-color:#FFD940;font-weight:600}
.filter-btn:not(.active):hover{background:rgba(255,255,255,.1)}
.view-btns{margin-left:auto;display:flex;gap:4px}
.view-btn{padding:5px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.view-btn.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}

.feed-list{display:flex;flex-direction:column;gap:10px}
.feed-item{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:14px 16px;transition:border-color .15s}
.feed-item:hover{border-color:var(--c-border2)}
.feed-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.feed-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;flex-shrink:0;letter-spacing:.03em}
.badge-schedule{background:var(--c-sched-bg);color:var(--c-sched-fg)}
.badge-sns{background:var(--c-sns-bg);color:var(--c-sns-fg)}
.badge-bubble{background:#FFF3E0;color:#E65100}
.badge-media{background:#2D1040;color:#D68EF8}
.badge-message{background:#E8F5E9;color:#1B5E20}
.feed-datetime{font-size:11px;color:var(--c-hint)}
.feed-actions{margin-left:auto;display:flex;gap:2px}
.feed-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 6px;border-radius:4px;color:var(--c-hint);transition:all .15s}
.feed-btn:hover{background:var(--c-bg)}
.feed-title{font-size:14px;font-weight:500;color:var(--c-text);margin-bottom:3px}
.feed-desc{font-size:13px;color:var(--c-muted);line-height:1.6;white-space:pre-wrap}
.feed-source{font-size:11px;color:var(--c-hint);margin-top:5px}
.feed-photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.feed-photo{width:90px;height:90px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--c-border);cursor:pointer;transition:transform .15s}
.feed-photo:hover{transform:scale(1.04)}

.photo-wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.pw-item{position:relative;cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--c-border)}
.pw-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;transition:transform .2s}
.pw-item:hover img{transform:scale(1.05)}
.pw-label{padding:5px 8px;background:var(--c-surface)}
.pw-label-date{font-size:10px;color:var(--c-hint)}
.pw-label-title{font-size:11px;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.empty{padding:48px;text-align:center;color:var(--c-hint);font-size:13px;background:var(--c-surface);border:1px dashed var(--c-border);border-radius:var(--radius-lg)}
.empty-icon{font-size:32px;margin-bottom:8px}

/* ── Add/Edit form in slide-over ── */
.slideover{position:fixed;right:0;top:0;height:100vh;width:400px;background:#F5F3F0;border-left:1px solid #DDD9D4;overflow-y:auto;z-index:300;transform:translateX(100%);transition:transform .25s;box-shadow:-6px 0 24px rgba(0,0,0,.18)}
.slideover.open{transform:translateX(0)}
.so-head{padding:18px 20px;border-bottom:1px solid #DDD9D4;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#F5F3F0;z-index:1}
.so-head h2{font-size:15px;font-weight:500;letter-spacing:.02em;color:#1A1714}
.so-close{width:30px;height:30px;border-radius:var(--radius);border:1px solid #C4BFB8;background:none;cursor:pointer;font-size:16px;color:#6B6460;display:flex;align-items:center;justify-content:center}
.so-body{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:500;color:#5A5450;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 11px;border:1px solid #C4BFB8;border-radius:var(--radius);font-family:inherit;font-size:13px;color:#1A1714;background:#FFFFFF;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--c-accent)}
.form-group textarea{resize:vertical;min-height:72px}
.date-time-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btns{display:flex;gap:6px;flex-wrap:wrap}
.type-btn{padding:6px 13px;border-radius:20px;border:1px solid #C4BFB8;background:transparent;color:#4A4644;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.type-btn.active-schedule{background:var(--c-sched-bg);color:var(--c-sched-fg);border-color:#AFA9EC}
.type-btn.active-sns{background:var(--c-sns-bg);color:var(--c-sns-fg);border-color:#5DCAA5}
.type-btn.active-bubble{background:#FFF3E0;color:#E65100;border-color:#FFAB76}
.type-btn.active-media{background:#2D1040;color:#D68EF8;border-color:#B44FE8}
.type-btn.active-message{background:#E8F5E9;color:#1B5E20;border-color:#A5D6A7}
.photo-upload-area{border:2px dashed var(--c-border2);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--c-bg)}
.photo-upload-area:hover{border-color:var(--c-accent);background:#F7F6F4}
.photo-upload-area p{font-size:11px;color:var(--c-hint);margin-top:4px}
.photo-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.photo-thumb{width:64px;height:64px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--c-border)}
.thumb-wrap{position:relative;display:inline-block}
.thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#E24B4A;color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:700;line-height:18px;text-align:center}
.btn-save{width:100%;padding:11px;border-radius:var(--radius);border:1px solid var(--c-accent);background:var(--c-accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:opacity .15s;margin-top:6px}
.btn-save:hover{opacity:.85}
.btn-cancel-sm{width:100%;padding:9px;border-radius:var(--radius);border:1px solid var(--c-border);background:transparent;color:var(--c-muted);font-size:13px;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-cancel-sm:hover{background:var(--c-bg)}
.existing-photos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.existing-thumb-wrap{position:relative;display:inline-block}
.existing-thumb{width:64px;height:64px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--c-border)}
.existing-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#E24B4A;color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:700;line-height:18px;text-align:center}
.fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:#FFD940;color:#201F1F;border:none;cursor:pointer;font-size:24px;box-shadow:0 4px 16px rgba(255,217,64,.3);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s;font-weight:700}
.fab:hover{transform:scale(1.08)}

/* ── Day slide-over (detail) ── */
.day-so{position:fixed;right:0;top:0;height:100vh;width:380px;background:var(--c-surface);border-left:1px solid var(--c-border);overflow-y:auto;z-index:250;transform:translateX(100%);transition:transform .25s;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
.day-so.open{transform:translateX(0)}
.day-so-head{padding:16px 20px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--c-surface);z-index:1}
.day-so-head h3{font-size:15px;font-weight:500}
.day-so-body{padding:16px 20px}

/* ── Password modal ── */
.pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;align-items:center;justify-content:center;padding:20px}
.pw-modal.open{display:flex}
.pw-box{background:#201F1F;border:1px solid rgba(255,217,64,.3);border-radius:16px;padding:32px 28px;width:100%;max-width:320px;text-align:center;position:relative}
.pw-box h3{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#FFD940;margin-bottom:6px;letter-spacing:.04em}
.pw-box p{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:20px;letter-spacing:.04em}
.pw-input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(255,217,64,.3);background:rgba(255,255,255,.05);color:#fff;font-size:15px;font-family:inherit;text-align:center;letter-spacing:.1em;outline:none;margin-bottom:10px}
.pw-input:focus{border-color:#FFD940}
.pw-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:.04em}
.pw-btn{width:100%;padding:11px;border-radius:8px;border:none;background:#FFD940;color:#201F1F;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.06em;transition:opacity .15s}
.pw-btn:hover{opacity:.85}
.pw-err{font-size:11px;color:#D4537E;margin-top:8px;min-height:16px}
.lock-btn{padding:5px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
.lock-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.lock-btn.unlocked{color:#FFD940;border-color:rgba(255,217,64,.4)}
/* Hide edit controls when locked */
body.locked .fab{display:none}
body.locked #feed-container .feed-actions{display:none}

.overlay.show{display:block}
/* ── Search & date range ── */
.feed-row1{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.feed-row2{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.search-wrap{flex:1;min-width:160px}
.search-input{width:100%;padding:7px 12px;border:1px solid rgba(255,255,255,.15);border-radius:20px;font-family:inherit;font-size:13px;color:#E8E4E0;background:rgba(255,255,255,.08);outline:none;transition:border-color .15s}
.search-input:focus{border-color:#7F77DD}
.date-range-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-range-input{padding:6px 10px;border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);font-family:inherit;font-size:12px;color:#E8E4E0;background:rgba(255,255,255,.08);outline:none;cursor:pointer}
.date-range-input:focus{border-color:#7F77DD}
.date-range-sep{color:rgba(255,255,255,.4);font-size:12px}
.date-range-clear{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:13px;padding:2px 6px;border-radius:4px;transition:all .15s}
.date-range-clear:hover{background:var(--c-bg);color:var(--c-text)}

/* ── Toast notification ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1714;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Confirm dialog ── */
.confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:#F5F3F0;border-radius:16px;padding:28px 24px;width:100%;max-width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.confirm-box p{font-size:15px;font-weight:500;color:#1A1714;margin-bottom:6px}
.confirm-box .confirm-sub{font-size:13px;color:#6B6460;margin-bottom:20px;font-weight:400}
.confirm-btns{display:flex;gap:8px}
.confirm-cancel{flex:1;padding:10px;border-radius:var(--radius);border:1px solid #C4BFB8;background:transparent;color:#6B6460;font-size:13px;cursor:pointer;font-family:inherit}
.confirm-ok{flex:1;padding:10px;border-radius:var(--radius);border:none;background:#E24B4A;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.confirm-cancel:hover{background:var(--c-bg)}
.confirm-ok:hover{opacity:.88}


/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}
.lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none}

@media(max-width:700px){
  /* Header */
  .site-header{padding:10px 14px 0}
  .site-title-en{font-size:28px}
  .site-title-cal{font-size:13px;letter-spacing:.08em;order:1;width:100%;text-align:center;margin-bottom:8px}
  .header-row1{gap:12px;padding-bottom:6px}
  .header-row2{display:flex;flex-wrap:nowrap;gap:6px;padding:5px 0 10px;justify-content:space-between;align-items:center}
  .header-actions{display:flex;gap:4px;flex-shrink:0}
  .page-tabs{flex-shrink:0}
  .page-tab{padding:4px 10px;font-size:10px}
  .site-title-kr{font-size:18px;margin-top:4px}
  .tab-full{display:none}

  /* Pages */
  .page{padding:12px}

  /* Calendar header */
  .cal-header{margin-bottom:14px;gap:12px}
  .cal-month-title{font-size:22px}
  .nav-btn{width:28px;height:28px;font-size:14px}

  /* DOW labels */
  .cal-dow{font-size:8px;padding:0 0 3px 1px;letter-spacing:.02em}

  /* Calendar grid — 手機改成3欄，每格可以夠大 */
  .cal-dow-row{grid-template-columns:repeat(7,1fr);gap:1px}
  .cal-grid{grid-template-columns:repeat(7,1fr);grid-auto-rows:90px;gap:1px}
  .cal-cell{height:90px}

  /* Cell content */

  /* Feed */

  .view-btn{padding:4px 10px;font-size:11px}
  .feed-item{padding:12px 13px}
  .feed-title{font-size:13px}
  .feed-desc{font-size:12px}
  .feed-photo{width:75px;height:75px}

  /* Photo wall */
  .photo-wall{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}

  /* Slide-overs */

  .slideover.open{transform:translateY(0)}
  .day-so{width:100%;border-radius:20px 20px 0 0;top:auto;bottom:0;height:85vh;transform:translateY(100%)}
  .day-so.open{transform:translateY(0)}
  .so-head{border-radius:20px 20px 0 0;padding:14px 16px}
  .so-body{padding:14px 16px}
  .day-so-head{border-radius:20px 20px 0 0;padding:14px 16px}
  .day-so-body{padding:14px 16px}

  /* FAB */
  .fab{bottom:24px;right:20px;width:48px;height:48px;font-size:22px}

  /* Form */
  .form-group input,.form-group textarea{font-size:16px}/* 防止 iOS 自動縮放 */
  .date-time-row{grid-template-columns:1fr 1fr;gap:6px}
  .btn-save{padding:13px;font-size:14px}
  .type-btns{flex-wrap:nowrap;gap:4px;overflow-x:auto;padding-bottom:2px}

}

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBgKyloBzX_yX-W-f8Bq7gM5NV8heZX3cQ",
  authDomain: "junho-calendar-bc2ff.firebaseapp.com",
  projectId: "junho-calendar-bc2ff",
  storageBucket: "junho-calendar-bc2ff.firebasestorage.app",
  messagingSenderId: "899641237737",
  appId: "1:899641237737:web:9c2ce8761edc4285181078"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const colRef = db.collection('records');

let records = [];
let currentType = 'schedule';
let editId = null;
let pendingPhotos = [];
let currentFilter = 'all';
let currentView = 'list';
let viewYear, viewMonth;

var EDIT_PASSWORD = 'jh0125';
var confirmCallback = null;

function showToast(msg, duration){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){ t.classList.remove('show'); }, duration||2200);
}

function openConfirm(cb){
  confirmCallback=cb;
  document.getElementById('confirm-modal').classList.add('open');
  document.getElementById('confirm-ok-btn').onclick=function(){ closeConfirm(); cb(); };
}
function closeConfirm(){
  document.getElementById('confirm-modal').classList.remove('open');
  confirmCallback=null;
}

function clearDateRange(){
  document.getElementById('date-from').value='';
  document.getElementById('date-to').value='';
  renderFeed();
}
var isUnlocked = false;

function toggleLock(){
  if(isUnlocked){
    // Lock
    isUnlocked = false;
    document.body.classList.add('locked');
    var btn=document.getElementById('lock-btn');
    btn.textContent='🔒 瀏覽模式'; btn.classList.remove('unlocked');
    renderAll(); renderDaySo();
  } else {
    // Show password modal
    document.getElementById('pw-modal').classList.add('open');
    document.getElementById('pw-input').value='';
    document.getElementById('pw-err').textContent='';
    setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
  }
}

function checkPassword(){
  var val = document.getElementById('pw-input').value;
  if(val === EDIT_PASSWORD){
    isUnlocked = true;
    document.body.classList.remove('locked');
    document.getElementById('pw-modal').classList.remove('open');
    var btn=document.getElementById('lock-btn');
    btn.textContent='🔓 編輯模式'; btn.classList.add('unlocked');
    renderAll(); renderDaySo();
  } else {
    document.getElementById('pw-err').textContent='密碼錯誤，請再試一次';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function openAddFormGuarded(){
  if(!isUnlocked){ toggleLock(); return; }
  openAddForm();
}

function showStatus(msg, ok){
  if(ok===undefined) ok=true;
  var el=document.getElementById('sync-status');
  if(!el){
    el=document.createElement('div'); el.id='sync-status';
    el.style.cssText='position:fixed;bottom:88px;right:28px;padding:7px 14px;border-radius:20px;font-size:12px;font-family:inherit;z-index:999;transition:opacity .4s;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent=msg;
  el.style.background=ok?'#1D9E75':'#D4537E';
  el.style.color='#fff'; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(function(){el.style.opacity='0';},2800);
}

function init(){
  document.body.classList.add('locked'); // start locked
  var now=new Date();
  viewYear=now.getFullYear(); viewMonth=now.getMonth();
  document.getElementById('f-date').value=now.toISOString().split('T')[0];
  renderCalendar();
  showStatus('連線中…',true);
  colRef.orderBy('createdAt','desc').onSnapshot(function(snap){
    records=snap.docs.map(function(d){ return Object.assign({},d.data(),{_fid:d.id}); });
    records.sort(function(a,b){ return b.date.localeCompare(a.date)||((b.time||'').localeCompare(a.time||'')); });
    renderAll();
    renderDaySo();
    showStatus('已同步 ✓',true);
  }, function(err){ showStatus('連線失敗，請重新整理',false); console.error(err); });
}

function saveData(record, fid){
  try{
    if(fid){ return colRef.doc(fid).update(record).then(function(){showStatus('已更新 ✓');}); }
    else { return colRef.add(Object.assign({},record,{createdAt:Date.now()})).then(function(){showStatus('已儲存 ✓');}); }
  }catch(e){ showStatus('儲存失敗',false); console.error(e); }
}

function deleteFromDB(fid){
  return colRef.doc(fid).delete().then(function(){showStatus('已刪除');}).catch(function(e){showStatus('刪除失敗',false);});
}

function renderAll(){ renderCalendar(); renderFeed(); }
function toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function switchPage(p,el){
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.page-tab').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  if(p==='feed') renderFeed();
}

function changeMonth(d){ viewMonth+=d; if(viewMonth>11){viewMonth=0;viewYear++;} if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); }
var MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];

function setCalFilter(f,el){
  calFilter=f;
  document.querySelectorAll('.cal-filter-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('cal-title').textContent=MONTHS_EN[viewMonth]+' '+viewYear;
  var grid=document.getElementById('cal-grid');
  grid.querySelectorAll('.cal-cell').forEach(function(c){c.remove();});
  var first=new Date(viewYear,viewMonth,1), last=new Date(viewYear,viewMonth+1,0);
  var today=toISO(new Date()), cells=[];
  var firstDow=(first.getDay()+6)%7;
  for(var i=0;i<firstDow;i++) cells.push({d:new Date(viewYear,viewMonth,-firstDow+1+i),other:true});
  for(var i=1;i<=last.getDate();i++) cells.push({d:new Date(viewYear,viewMonth,i),other:false});
  var rem=7-(cells.length%7||7);
  for(var i=1;i<=rem&&rem<7;i++) cells.push({d:new Date(viewYear,viewMonth+1,i),other:true});
  cells.forEach(function(item){
    var d=item.d, other=item.other;
    var iso=toISO(d);
    var dayRecs=records.filter(function(r){return r.date===iso&&(calFilter==='all'||r.type===calFilter);}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
    var firstPhoto=null;
    for(var ri=0;ri<dayRecs.length;ri++){var ph=(dayRecs[ri].photos||[]);if(ph.length){firstPhoto=ph[0];break;}}
    var firstRec=dayRecs[0];
    var el=document.createElement('div');
    var cls='cal-cell'+(other?' other-month':'')+(iso===today?' today':'')+(dayRecs.length?' has-records':'');
    el.className=cls;
    var typesSeen={}, dots='';
    dayRecs.forEach(function(r){if(!typesSeen[r.type]){typesSeen[r.type]=1;dots+='<span class="cdot cdot-'+r.type+'"></span>';}});
    var dateNum=String(d.getDate()).padStart(2,'0');
    var photoHTML=firstPhoto
      ?'<div class="cell-photo"><img src="'+firstPhoto+'" alt="" loading="lazy"></div>'
      :'<div class="cell-photo"><div class="cell-photo-empty"></div></div>';
    var titlesHTML='';
    var titlesMobileHTML='';
    if(dayRecs.length){
      // Desktop: show all titles
      dayRecs.forEach(function(rec){
        titlesHTML+='<div class="cell-title">'+escHtml(rec.title)+'</div>';
      });
      // Mobile: show first 2 titles + N more
      var mShow=dayRecs.slice(0,2);
      mShow.forEach(function(rec){
        titlesMobileHTML+='<div class="cell-title">'+escHtml(rec.title)+'</div>';
      });
      if(dayRecs.length>2) titlesMobileHTML+='<div class="cell-sub">+'+(dayRecs.length-2)+'</div>';
    }
    el.innerHTML='<div class="cell-date-row"><span class="cell-date">'+dateNum+'</span><span class="cell-dots">'+dots+'</span></div>'+photoHTML+'<div class="cell-text cell-text-desktop">'+titlesHTML+'</div><div class="cell-text cell-text-mobile">'+titlesMobileHTML+'</div>';
    if(dayRecs.length){ (function(iso,d){el.onclick=function(){openDaySo(iso,d);};})(iso,d); }
    grid.appendChild(el);
  });
}

var calFilter = 'all';
var currentDayISO = null;
var currentDayDate = null;

function openDaySo(iso,d){
  currentDayISO=iso; currentDayDate=d;
  document.getElementById('day-so').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  renderDaySo();
}
function renderDaySo(){
  if(!currentDayISO) return;
  if(!document.getElementById('day-so').classList.contains('open')) return;
  var d=currentDayDate;
  var recs=records.filter(function(r){return r.date===currentDayISO;}).sort(function(a,b){return (a.time||'').localeCompare(b.time||'');});
  document.getElementById('day-so-title').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日';
  document.getElementById('day-so-body').innerHTML=recs.length
    ? recs.map(function(r){ return feedItemHTML(r); }).join('')
    : '<div style="padding:20px;text-align:center;color:var(--c-hint);font-size:13px">本日無記錄</div>';
}
function closeDaySo(){ 
  document.getElementById('day-so').classList.remove('open'); 
  document.getElementById('overlay').classList.remove('show');
  currentDayISO=null; currentDayDate=null;
}

function openAddForm(date){
  editId=null;
  document.getElementById('so-title').textContent='新增記錄';
  document.getElementById('f-date').value=date||toISO(new Date());
  document.getElementById('f-time').value='';
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-source').value='';
  document.getElementById('f-photos').value='';
  pendingPhotos=[]; renderPreviews();
  currentType='schedule';
  document.querySelectorAll('#add-type-btns .type-btn').forEach(function(b){b.className='type-btn';});
  document.querySelector('#add-type-btns .type-btn').className='type-btn active-schedule';
  document.getElementById('add-so').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeAddForm(){ document.getElementById('add-so').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function closeAll(){ closeAddForm(); closeDaySo(); }

function openEditModal(fid){
  var rec=null;
  for(var i=0;i<records.length;i++){if(records[i]._fid===fid){rec=records[i];break;}}
  if(!rec) return;
  editId=fid;
  document.getElementById('so-title').textContent='編輯記錄';
  document.getElementById('f-date').value=rec.date;
  document.getElementById('f-time').value=rec.time||'';
  document.getElementById('f-title').value=rec.title;
  document.getElementById('f-desc').value=rec.desc||'';
  document.getElementById('f-source').value=rec.source||'';
  document.getElementById('f-photos').value='';
  pendingPhotos=(rec.photos||[]).map(function(data,i){return {name:'p'+i,data:data};});
  renderPreviews();
  document.querySelectorAll('#add-type-btns .type-btn').forEach(function(b){b.className='type-btn';});
  var tmap={schedule:0,sns:1,bubble:2,media:3,message:4};
  var btns=document.querySelectorAll('#add-type-btns .type-btn');
  btns[tmap[rec.type]||0].className='type-btn active-'+rec.type;
  currentType=rec.type;
  document.getElementById('add-so').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  closeDaySo();
}

function saveRecord(){
  var date=document.getElementById('f-date').value;
  var time=document.getElementById('f-time').value;
  var title=document.getElementById('f-title').value.trim();
  var desc=document.getElementById('f-desc').value.trim();
  var source=document.getElementById('f-source').value.trim();
  if(!date||!title){ alert('請填寫日期和標題'); return; }
  var photos=pendingPhotos.map(function(p){return p.data;});
  var record={type:currentType,date:date,time:time,title:title,desc:desc,source:source,photos:photos};
  var eid=editId;
  pendingPhotos=[]; closeAddForm(); showToast('✓ 已儲存'); editId=null;
  saveData(record, eid||null);
}

function setType(t,el){
  currentType=t;
  document.querySelectorAll('#add-type-btns .type-btn').forEach(function(b){b.className='type-btn';});
  el.className='type-btn active-'+t;
}

function handleFileInput(e){ processFiles(Array.from(e.target.files)); }
function handleDrop(e){ e.preventDefault(); processFiles(Array.from(e.dataTransfer.files).filter(function(f){return f.type.indexOf('image/')===0;})); }

function processFiles(files){
  files.forEach(function(file){
    var img=new Image();
    var url=URL.createObjectURL(file);
    img.onload=function(){
      // Compress: max 1200px wide, quality 0.75
      var MAX=1200, q=0.75;
      var w=img.width, h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      var canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var data=canvas.toDataURL('image/jpeg',q);
      URL.revokeObjectURL(url);
      pendingPhotos.push({name:file.name,data:data});
      renderPreviews();
    };
    img.src=url;
  });
}
function renderPreviews(){
  var count = pendingPhotos.length;
  var countHint = count>0 ? '<div style="font-size:11px;color:var(--c-hint);margin:6px 0 4px">已選 '+count+' 張</div>' : '';
  document.getElementById('preview-wrap').innerHTML = countHint + pendingPhotos.map(function(p,i){
    return '<div class="thumb-wrap"><img class="photo-thumb" src="'+p.data+'"><button class="thumb-del" onclick="removePhoto('+i+')">✕</button></div>';
  }).join('');
}
function removePhoto(i){ pendingPhotos.splice(i,1); renderPreviews(); }

function deleteRecord(fid){
  openConfirm(function(){ _doDelete(fid); }); return;
}
function _doDelete(fid){
  closeDaySo();
  deleteFromDB(fid);
}

function setFilter(f,el){ currentFilter=f; document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');}); el.classList.add('active'); renderFeed(); }
function setView(v,el){ currentView=v; document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active');}); el.classList.add('active'); renderFeed(); }

var LABELS={schedule:'行程',sns:'社群',bubble:'泡泡',media:'媒體',message:'消息'};
function feedItemHTML(r){
  var fid=r._fid||'';
  var dt=r.time?(r.date+' '+r.time):r.date;
  var photos=(r.photos||[]).length
    ?'<div class="feed-photos">'+r.photos.map(function(src){return '<img class="feed-photo" src="'+src+'" onclick="openLightbox(this.src)" alt="">';}).join('')+'</div>':'';
  var desc=r.desc?'<div class="feed-desc">'+escHtml(r.desc)+'</div>':'';
  var srcRaw=(r.source||'').trim();
  var srcUrl=null;
  if(srcRaw){
    if(/^https?:\/\//i.test(srcRaw)) srcUrl=srcRaw;
    else if(/^www\./i.test(srcRaw)) srcUrl='https://'+srcRaw;
    else if(/^[a-z0-9-]+\.[a-z]{2,}(\/.*)?$/i.test(srcRaw)) srcUrl='https://'+srcRaw;
  }
  var src=srcRaw?'<div class="feed-source">🔗 '+(srcUrl?'<a href="'+escHtml(srcUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--c-accent);text-decoration:underline;cursor:pointer">'+escHtml(srcRaw)+'</a>':escHtml(srcRaw))+'</div>':'';
  var actions = isUnlocked
    ? '<div class="feed-actions">'
      +'<button class="feed-btn edit-action" data-fid="'+fid+'" onclick="handleEdit(this.dataset.fid)" title="編輯">✏️</button>'
      +'<button class="feed-btn del-action" data-fid="'+fid+'" onclick="handleDelete(this.dataset.fid)" title="刪除">🗑</button>'
      +'</div>'
    : '';
  return '<div class="feed-item">'
    +'<div class="feed-top">'
    +'<span class="feed-badge badge-'+r.type+'">'+(LABELS[r.type]||r.type)+'</span>'
    +'<span class="feed-datetime">'+dt+'</span>'
    +actions
    +'</div>'
    +'<div class="feed-title">'+escHtml(r.title)+'</div>'
    +desc+src+photos
    +'</div>';
}

function handleEdit(fid){
  if(!isUnlocked){ toggleLock(); return; }
  openEditModal(fid);
}
function handleDelete(fid){
  if(!isUnlocked){ toggleLock(); return; }
  deleteRecord(fid);
}

function renderFeed(){
  var container=document.getElementById('feed-container');
  var searchQ=(document.getElementById('search-input')?document.getElementById('search-input').value.trim().toLowerCase():'');
  var dateFrom=document.getElementById('date-from')?document.getElementById('date-from').value:'';
  var dateTo=document.getElementById('date-to')?document.getElementById('date-to').value:'';
  var filtered=records.filter(function(r){
    if(currentFilter!=='all'&&r.type!==currentFilter) return false;
    if(searchQ&&!(r.title.toLowerCase().includes(searchQ)||(r.desc||'').toLowerCase().includes(searchQ))) return false;
    if(dateFrom&&r.date<dateFrom) return false;
    if(dateTo&&r.date>dateTo) return false;
    return true;
  });
  filtered.sort(function(a,b){return b.date.localeCompare(a.date)||((b.time||'').localeCompare(a.time||''));});
  if(currentView==='list'){
    container.innerHTML=filtered.length
      ?'<div class="feed-list">'+filtered.map(feedItemHTML).join('')+'</div>'
      :'<div class="empty"><div class="empty-icon">🌟</div>尚無記錄，點右下角 ＋ 新增</div>';
  } else {
    var allPhotos=[];
    filtered.forEach(function(r){(r.photos||[]).forEach(function(p){allPhotos.push({src:p,title:r.title,date:r.date,time:r.time});});});
    container.innerHTML=allPhotos.length
      ?'<div class="photo-wall">'+allPhotos.map(function(p){
          return '<div class="pw-item" onclick="openLightbox(this.querySelector(\'img\').src)"><img src="'+p.src+'" alt="'+escHtml(p.title)+'"><div class="pw-label"><div class="pw-label-date">'+p.date+(p.time?' '+p.time:'')+'</div><div class="pw-label-title">'+escHtml(p.title)+'</div></div></div>';
        }).join('')+'</div>'
      :'<div class="empty"><div class="empty-icon">🖼</div>尚無照片記錄</div>';
  }
}

function openLightbox(src){ document.getElementById('lb-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

// Expose all functions to global scope for inline onclick handlers
window.setCalFilter=setCalFilter;
window.clearDateRange=clearDateRange;
window.openConfirm=openConfirm;
window.closeConfirm=closeConfirm;
window.showToast=showToast;
window.toggleLock=toggleLock;
window.checkPassword=checkPassword;
window.openAddFormGuarded=openAddFormGuarded;
window.renderDaySo=renderDaySo;
window.isUnlocked=function(){ return isUnlocked; };
window.switchPage=switchPage;
window.changeMonth=changeMonth;
window.setFilter=setFilter;
window.setView=setView;
window.openAddForm=openAddForm;
window.closeAddForm=closeAddForm;
window.closeAll=closeAll;
window.openEditModal=openEditModal;
window.saveRecord=saveRecord;
window.setType=setType;
window.handleFileInput=handleFileInput;
window.handleDrop=handleDrop;
window.removePhoto=removePhoto;
window.deleteRecord=deleteRecord;
window.openDaySo=openDaySo;
window.closeDaySo=closeDaySo;
window.openLightbox=openLightbox;
window.closeLightbox=closeLightbox;

init();
</script>
